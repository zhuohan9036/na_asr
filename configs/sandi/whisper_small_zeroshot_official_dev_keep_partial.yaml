experiment:
  name: whisper_small_zeroshot_official_dev_keep_partial

data:
  test_manifest: data/sandi/manifests/official_dev.jsonl

model:
  name: openai/whisper-small
  language: en
  task: transcribe
  sampling_rate: 16000
  max_new_tokens: 128

runtime:
  device: cuda

evaluation:
  reference_col: transcript_word_keep_partial
  group_cols:
    - prompt_id
    - speaker_id

output:
  prediction_path: results/sandi/predictions/whisper_small_zeroshot_official_dev_keep_partial.jsonl
  metric_path: results/sandi/metrics/whisper_small_zeroshot_official_dev_keep_partial.json