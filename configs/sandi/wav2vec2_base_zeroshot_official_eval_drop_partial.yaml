experiment:
  name: wav2vec2_base_zeroshot_official_eval_drop_partial

data:
  test_manifest: data/sandi/manifests/official_eval.jsonl

model:
  name: facebook/wav2vec2-base-960h
  sampling_rate: 16000

runtime:
  device: cuda
  batch_size: 1

evaluation:
  reference_col: transcript_word_drop_partial
  group_cols:
    - prompt_id
    - speaker_id

output:
  prediction_path: results/sandi/predictions/wav2vec2_base_zeroshot_official_eval_drop_partial.jsonl
  metric_path: results/sandi/metrics/wav2vec2_base_zeroshot_official_eval_drop_partial.json