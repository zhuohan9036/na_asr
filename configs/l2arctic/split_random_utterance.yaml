experiment:
  name: split_random_utterance
seed: 42
data:
  input_metadata: data/l2arctic/raw/metadata_all.jsonl
  dataset_name: l2arctic
split:
  strategy: random_utterance
  train_ratio: 0.8
  dev_ratio: 0.1
  test_ratio: 0.1
  stratify_by_accent: true
output:
  manifest_dir: data/l2arctic/manifests/random_utterance
  summary_path: results/l2arctic/tables/random_utterance_split_summary.json
