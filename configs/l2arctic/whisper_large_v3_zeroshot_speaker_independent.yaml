experiment:
  name: whisper_large_v3_zeroshot_speaker_independent
data:
  test_manifest: data/l2arctic/manifests/speaker_independent/test.jsonl
  dataset_name: l2arctic
model:
  name: openai/whisper-large-v3
  language: en
  task: transcribe
  sampling_rate: 16000
  max_new_tokens: 128
runtime:
  device: cuda
output:
  prediction_path: results/l2arctic/predictions/whisper_large_v3_zeroshot_speaker_independent.jsonl
  metric_path: results/l2arctic/metrics/whisper_large_v3_zeroshot_speaker_independent.json
evaluation:
  reference_col: transcript
  group_cols:
  - accent_label
  - speaker_id
