experiment:
  name: whisper_medium_zeroshot_random_utterance
data:
  test_manifest: data/l2arctic/manifests/random_utterance/test.jsonl
  dataset_name: l2arctic
model:
  name: openai/whisper-medium
  language: en
  task: transcribe
  sampling_rate: 16000
  max_new_tokens: 128
runtime:
  device: cuda
output:
  prediction_path: results/l2arctic/predictions/whisper_medium_zeroshot_random_utterance.jsonl
  metric_path: results/l2arctic/metrics/whisper_medium_zeroshot_random_utterance.json
evaluation:
  reference_col: transcript
  group_cols:
  - accent_label
  - speaker_id
